<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>< L ! N K S ></title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="wrapper">
    <header>
        <h1>L!nk4U</h1>
        <p style="color: var(--text-dim)">Money makes you happy..hahaha!</p>
    </header>

    <div class="controls">
        <div class="stats-badge"><span id="linkCount">0</span> Pages Stored</div>
        <button class="btn-toggle" onclick="toggleVault()">
            <i id="toggleIcon" class="fas fa-plus"></i>
            <span id="toggleText">Open Editor</span>
        </button>
    </div>

    <div id="formPanel" class="collapsed">
        <div class="glass-panel">
            <form id="linkForm" class="input-grid">
                <input type="hidden" id="editIndex">

                <div class="field">
                    <label><i class="fas fa-user"></i> PAGE NAME</label>
                    <input type="text" id="pageName" placeholder="e.g. Funny Vibes" required>
                </div>

                <div class="field">
                    <label><i class="fas fa-users"></i> FOLLOWERS</label>
                    <input type="text" id="followers" placeholder="e.g. 50K" required>
                </div>

                <div class="field full-row">
                    <label><i class="fas fa-link"></i> PAGE LINK</label>
                    <input type="url" id="pageLink" placeholder="https://instagram.com/yourpage" required>
                </div>

                <div class="field full-row">
                    <label><i class="fas fa-film"></i> 1ST REEL LINK</label>
                    <input type="url" id="reelLink" placeholder="https://instagram.com/reel/..." required>
                </div>

                <div class="btn-row full-row">
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i> SAVE TO VAULT
                    </button>
                    <button type="button" class="btn-whatsapp" onclick="sendToWhatsApp()">
                        <i class="fab fa-whatsapp"></i> Send to WhatsApp
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="linksContainer" class="links-container"></div>
</div>

<script src="script.js"></script>
</body>
</html>
