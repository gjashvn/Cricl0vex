<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ASHADS • Views ⇄ INR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: linear-gradient(135deg, #0B0F1C 0%, #111827 100%);
            --glass-card: rgba(18, 25, 45, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-light: #F1F5F9;
            --text-muted: #A0AEC0;
            --gradient-primary: linear-gradient(105deg, #EC4899 0%, #F59E0B 100%);
            --gradient-purple: linear-gradient(120deg, #8B5CF6, #EC4899);
        }

        [data-theme="light"] {
            --bg-deep: linear-gradient(125deg, #F8FAFC 0%, #EFF6FF 100%);
            --glass-card: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.08);
            --text-light: #0F172A;
            --text-muted: #334155;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text-light);
            min-height: 100vh;
            transition: background 0.3s ease, color 0.2s ease;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 60%),
                        radial-gradient(circle at 85% 70%, rgba(245, 158, 11, 0.12) 0%, transparent 55%);
            pointer-events: none;
            z-index: -1;
        }

        .glass-nav {
            backdrop-filter: blur(18px);
            background: rgba(15, 23, 42, 0.65);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        [data-theme="light"] .glass-nav {
            background: rgba(255, 255, 255, 0.75);
        }
        .logo {
            font-size: 1.9rem;
            font-weight: 900;
            background: var(--gradient-primary);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .social-links {
            display: flex;
            gap: 0.7rem;
            flex-wrap: wrap;
        }
        .icon-btn {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
            padding: 0.7rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.25s ease;
            border: 1px solid var(--glass-border);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .icon-btn:hover {
            background: rgba(236, 72, 153, 0.25);
            transform: translateY(-3px);
            border-color: rgba(236,72,153,0.5);
        }
        .theme-switch {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            padding: 0.6rem 1.2rem;
            border-radius: 2.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-light);
        }

        .main-container {
            max-width: 750px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .premium-card {
            background: var(--glass-card);
            backdrop-filter: blur(18px);
            border-radius: 2rem;
            border: 1px solid var(--glass-border);
            padding: 2.2rem 1.8rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.3);
            transition: transform 0.25s ease, box-shadow 0.3s;
        }
        .premium-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 30px 50px -12px rgba(236, 72, 153, 0.2);
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 800;
            text-align: center;
            background: var(--gradient-purple);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.8rem;
        }

        .form-row {
            margin-bottom: 1.8rem;
        }
        label {
            font-weight: 600;
            margin-bottom: 0.6rem;
            display: block;
            letter-spacing: -0.2px;
            color: var(--text-light);
        }
        select, input {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            font-size: 1rem;
            color: var(--text-light);
            transition: 0.2s;
            font-weight: 500;
        }
        [data-theme="light"] select, [data-theme="light"] input {
            background: white;
            color: #0f172a;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #EC4899;
            box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.3);
        }
        .radio-group {
            display: flex;
            gap: 1.2rem;
            background: rgba(255,255,255,0.04);
            padding: 0.8rem 1.2rem;
            border-radius: 2rem;
            flex-wrap: wrap;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            margin-bottom: 0;
            cursor: pointer;
        }
        .radio-group input {
            width: 18px;
            height: 18px;
            accent-color: #EC4899;
        }

        .btn-calc {
            background: var(--gradient-primary);
            border: none;
            width: 100%;
            padding: 1.1rem;
            border-radius: 2rem;
            font-weight: 800;
            font-size: 1.1rem;
            color: white;
            margin-top: 0.6rem;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 8px 20px rgba(236, 72, 153, 0.3);
            letter-spacing: 0.3px;
        }
        .btn-calc:hover {
            transform: scale(1.01) translateY(-3px);
            box-shadow: 0 15px 30px rgba(236, 72, 153, 0.5);
        }

        .result-box {
            margin-top: 2rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1.6rem;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeSlide 0.4s ease;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(12px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 0.9rem 0;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            font-weight: 500;
        }
        .result-item:last-child {
            border: none;
        }
        .highlight {
            font-weight: 800;
            color: #F59E0B;
            font-size: 1.2rem;
        }
        .tax-badge {
            background: rgba(245, 158, 11, 0.2);
            border-radius: 1rem;
            padding: 0.7rem;
            text-align: center;
            font-size: 0.85rem;
            margin-top: 0.8rem;
        }
        .info-strip {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.2);
            border-radius: 2rem;
            padding: 0.6rem;
            color: var(--text-muted);
        }

        @media (max-width: 640px) {
            .glass-nav {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .social-links {
                justify-content: center;
            }
            .premium-card {
                padding: 1.5rem;
            }
            .radio-group {
                flex-direction: column;
                gap: 0.7rem;
            }
            h1 {
                font-size: 1.6rem;
            }
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.7rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
<div class="glass-nav">
    <div class="logo">Gloab X Media</div>
    <div class="social-links">
        <a href="https://chat.whatsapp.com/LuIZeCGduEM6VIwAnvrsuF?mode=gi_t" target="_blank" class="icon-btn">Join US!💸</a>
        <a href="https://www.instagram.com/ashx.online/" target="_blank" class="icon-btn">AshX</a>
    </div>
    <button class="theme-switch" id="themeToggleBtn">🌙 Dark</button>
</div>

<div class="main-container">
    <div class="premium-card">
        <h1>Views ⇄ INR</h1>
        
        <div class="form-row">
            <label>CPM (₹ per million views)</label>
            <select id="cpmSelect">
                <!-- <option value="600">₹600</option>
                <option value="700">₹700</option> -->
                <option value="10000">₹10,000</option>
                <option value="custom">Custom CPM</option>
            </select>
            <div id="customCpmContainer" style="margin-top: 0.8rem; display: none;">
                <input type="number" id="customCpmInput" placeholder="Custom CPM (₹)" step="1" min="1" value="650">
            </div>
        </div>

        <div class="form-row">
            <label>Conversion</label>
            <div class="radio-group">
                <label><input type="radio" name="convType" value="viewsToINR" checked> Views → INR</label>
                <label><input type="radio" name="convType" value="INRToViews"> INR → Views</label>
            </div>
        </div>

        <div class="form-row">
            <label id="dynamicLabel">Views</label>
            <input type="number" id="mainInputValue" placeholder="Enter views" step="1" min="0">
        </div>

        <button class="btn-calc" id="calculateBtn">Calculate</button>

        <div id="resultsPanel" style="display: none;"></div>
    </div>
    <footer>Develop by Ashx</footer>
</div>

<script>
    // ---------- PURE VIEWS ↔ INR ----------
    let currentCpm = 600;
    let isCustomActive = false;
    
    const cpmSelect = document.getElementById('cpmSelect');
    const customContainer = document.getElementById('customCpmContainer');
    const customCpmInput = document.getElementById('customCpmInput');
    const radioViewsToINR = document.querySelector('input[value="viewsToINR"]');
    const radioINRToViews = document.querySelector('input[value="INRToViews"]');
    const mainInput = document.getElementById('mainInputValue');
    const dynamicLabel = document.getElementById('dynamicLabel');
    const resultsPanel = document.getElementById('resultsPanel');
    const calcBtn = document.getElementById('calculateBtn');

    function updateCpm() {
        const selectedVal = cpmSelect.value;
        if (selectedVal === 'custom') {
            isCustomActive = true;
            customContainer.style.display = 'block';
            let customVal = parseFloat(customCpmInput.value);
            if (isNaN(customVal) || customVal <= 0) customVal = 600;
            currentCpm = customVal;
        } else {
            isCustomActive = false;
            customContainer.style.display = 'none';
            currentCpm = parseFloat(selectedVal);
        }
        if (mainInput.value !== '') performCalculation();
    }

    cpmSelect.addEventListener('change', () => {
        updateCpm();
        if (mainInput.value !== '') performCalculation();
    });

    customCpmInput.addEventListener('input', () => {
        if (isCustomActive) {
            let val = parseFloat(customCpmInput.value);
            if (!isNaN(val) && val > 0) {
                currentCpm = val;
                if (mainInput.value !== '') performCalculation();
            }
        }
    });

    function updateInputLabel() {
        const isViewsMode = radioViewsToINR.checked;
        if (isViewsMode) {
            dynamicLabel.innerText = 'Views';
            mainInput.placeholder = 'e.g., 1,200,000';
        } else {
            dynamicLabel.innerText = 'INR (₹)';
            mainInput.placeholder = 'e.g., 5000';
        }
    }

    radioViewsToINR.addEventListener('change', () => {
        updateInputLabel();
        if (mainInput.value !== '') performCalculation();
    });
    radioINRToViews.addEventListener('change', () => {
        updateInputLabel();
        if (mainInput.value !== '') performCalculation();
    });

    function performCalculation() {
        const rawInput = mainInput.value.trim();
        if (rawInput === '') {
            resultsPanel.style.display = 'none';
            return;
        }
        let inputNumber = parseFloat(rawInput);
        if (isNaN(inputNumber) || inputNumber < 0) {
            resultsPanel.style.display = 'none';
            return;
        }

        const isViewsMode = radioViewsToINR.checked;
        let cpm = currentCpm;
        if (isNaN(cpm) || cpm <= 0) cpm = 600;

        let viewsNumber = 0;
        let grossINR = 0;

        if (isViewsMode) {
            viewsNumber = inputNumber;
            grossINR = (viewsNumber / 1000000) * cpm;
        } else {
            grossINR = inputNumber;
            viewsNumber = (grossINR / cpm) * 1000000;
        }

        const TAX_THRESHOLD = 4000;
        const TAX_RATE = 0.30;
        let taxAmount = 0;
        let finalINR = grossINR;
        let isTaxApplied = false;

        if (grossINR >= TAX_THRESHOLD) {
            taxAmount = grossINR * TAX_RATE;
            finalINR = grossINR - taxAmount;
            isTaxApplied = true;
        } else {
            finalINR = grossINR;
        }

        const finalRounded = finalINR < 0 ? 0 : finalINR;
        const grossRounded = grossINR < 0 ? 0 : grossINR;
        const viewsDisplay = Math.floor(viewsNumber);

        let resultHtml = `<div class="result-box">
                            <div class="result-item">
                                <span>${isViewsMode ? 'Views' : 'Views'}</span>
                                <span><strong>${viewsDisplay.toLocaleString('en-IN')}</strong></span>
                            </div>
                            <div class="result-item">
                                <span>₹INR</span>
                                <span>₹${grossRounded.toLocaleString('en-IN', { maximumFractionDigits: 2 })}</span>
                            </div>`;
        
        // if (isTaxApplied) {
        //     resultHtml += `<div class="result-item">
        //                         <span>Tax (30%)</span>
        //                         <span>- ₹${taxAmount.toLocaleString('en-IN', { maximumFractionDigits: 2 })}</span>
        //                     </div>`;
        // }
        // resultHtml += `<div class="result-item highlight">
        //                     <span>Net (₹)</span>
        //                     <span>₹${finalRounded.toLocaleString('en-IN', { maximumFractionDigits: 2 })}</span>
        //                 </div>`;
        
        // if (isTaxApplied) {
        //     resultHtml += `<div class="tax-badge">30% TDS applied (≥₹4000)</div>`;
        // } else if (grossRounded > 0 && !isTaxApplied) {
        //     resultHtml += `<div class="tax-badge" style="background:rgba(16,185,129,0.15);">No tax (below ₹4000)</div>`;
        // }
        
        resultHtml += `<div class="info-strip" style="margin-top:1rem; background:transparent;">CPM: ₹${cpm.toFixed(2)} / 1M views</div>`;
        resultHtml += `</div>`;
        
        resultsPanel.innerHTML = resultHtml;
        resultsPanel.style.display = 'block';
        resultsPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    mainInput.addEventListener('input', () => {
        if (mainInput.value !== '') performCalculation();
        else resultsPanel.style.display = 'none';
    });
    calcBtn.addEventListener('click', (e) => {
        e.preventDefault();
        if (mainInput.value !== '') performCalculation();
        else {
            resultsPanel.style.display = 'none';
        }
    });

    // theme
    const themeBtn = document.getElementById('themeToggleBtn');
    function setTheme(theme) {
        if (theme === 'light') {
            document.body.setAttribute('data-theme', 'light');
            themeBtn.innerHTML = '🌙 Dark';
        } else {
            document.body.removeAttribute('data-theme');
            themeBtn.innerHTML = '☀️ Light';
        }
    }
    themeBtn.addEventListener('click', () => {
        const isLight = document.body.getAttribute('data-theme') === 'light';
        if (isLight) setTheme('dark');
        else setTheme('light');
    });
    setTheme('dark');

    updateInputLabel();
    updateCpm();
    if (cpmSelect.value === 'custom') {
        let initCustom = parseFloat(customCpmInput.value);
        if (!isNaN(initCustom) && initCustom > 0) currentCpm = initCustom;
        else currentCpm = 600;
    }


</script>
</body>
</html>
